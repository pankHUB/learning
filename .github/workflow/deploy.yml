
name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # ── JOB 1: Run tests & build check ──────────────────────────
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build
        run: npm run build

  # ── JOB 2: Deploy to EC2 (only if CI passes) ─────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: ci          # blocks if ci job fails

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"

            cd /home/deployer/app

            # Pull latest code
            git pull origin main

            # Install dependencies
            npm ci

            # Build
            npm run build

            # Graceful restart (zero downtime)
            pm2 reload nextjs-app

            echo "✅ Deployment complete"

